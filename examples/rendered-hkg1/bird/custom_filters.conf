# AS4242420000 自定义过滤器。
#
# community_filters.conf 负责 DN42 社区通用逻辑；本文件只放本 AS 的策略：
# - 写入本 AS large community，标记路由来源节点和来源区域。
# - 按区域做简单 cold potato MED 调整。
# - 定义 iBGP 可以导入/导出的内部前缀集合。
# - 处理黑洞 community 和基础 AS_PATH 防护。

define OUTGOING_BGP_MED = 0;
# 同区域 cold-potato 偏好 MED（越低越优）；带本节点同大区 region 社区的路由在 import 时设为此值。
define COLD_POTATO_MED = 50;
define NODEID = 62;

# Large community 编号空间：(OWNAS, 类型, 值)。
# 当前编号由 DesiredState.bird.large_communities 提供。
define LC_ORIGIN_NODEID = 100;
define LC_ORIGIN_REGION = 101;
define LC_POLICY = 102;

define LC_POLICY_LOCAL_PREF = 10;
define LC_POLICY_DEPREP = 20;

function get_region_tag(int dn42_region_tag) {
  # 把 DN42 标准 region community 折叠成更粗的选路区域。
  # 返回值只在本文件内部用于 MED 调整，不会写入对外 community。
  if (dn42_region_tag = 44) then {
    return 1;
  } else if (dn42_region_tag ~ [42..43]) then {
    return 2;
  } else if (dn42_region_tag = 41) then {
    return 3;
  } else if (dn42_region_tag ~ [50..53]) then {
    return 4;
  } else if (dn42_region_tag = 46) then {
    return 5;
  }
  return 0;
}

define ASES_REJECT = [
  # 全局拒收 ASN。无配置时保留 0 作为占位，避免空列表语法问题。

  0

];

function prefer_cold_potato()
int my_region_tag;
int incoming_tag;
pair incoming_region_community;
{
  # 如果路由带有和本节点相同大区的 DN42 region community，则降低 MED。
  # 没带 region community 的路由也视为可接受的本地优先候选，避免误标记的 community 过度影响选路。
  my_region_tag = get_region_tag(DN42_REGION);
  incoming_region_community = filter(bgp_community, [(64511, 41..53)]).min;
  incoming_tag = get_region_tag(incoming_region_community.data);
  if (incoming_tag = 0 || incoming_tag = my_region_tag) then {
    bgp_med = COLD_POTATO_MED;
  }
}

function ebgp_import_filter() {
  # 这个函数由 community_filters.conf 的 dn42_import_filter() 调用。
  # 通用 ROA/前缀检查通过后，在这里执行本 AS 的附加入站策略。
  if (bgp_path.len > 8) then {
    reject "Rejected route for ", net, " with too long ", bgp_path;
  }

  bgp_med = 100;

  if (bgp_path ~ [= * ASES_REJECT * =]) then {
    reject "Rejected route for ", net, " from blocked ASN";
  }

  bgp_large_community.delete([(OWNAS, LC_ORIGIN_REGION, *)]);
  bgp_large_community.delete([(OWNAS, LC_ORIGIN_NODEID, *)]);
  bgp_large_community.delete([(OWNAS, LC_POLICY, *)]);

  prefer_cold_potato();

  # per-prefix local-pref 覆盖（精细路由调优）：只对精确匹配的前缀生效，不波及其余路由。
  # 仅本节点导入侧设值、经 iBGP 传播；不创建/不导出路由。

  if (source = RTS_BGP && (65535, 666) ~ bgp_community) then {
    # RFC 7999 BLACKHOLE community。保留路由但把目的地设为黑洞。
    dest = RTD_BLACKHOLE;
    print "Adding blackhole route for ", net, bgp_path;
  }

  bgp_large_community.add((OWNAS, LC_ORIGIN_REGION, DN42_REGION));
  bgp_large_community.add((OWNAS, LC_ORIGIN_NODEID, NODEID));
}

function ebgp_export_filter() {
  # 这个函数由 community_filters.conf 的 dn42_export_filter() 调用。
  # 只给本地产生的路由补充本 AS large community，转发自 eBGP/iBGP 的路由不重写来源信息。
  bgp_med = OUTGOING_BGP_MED;
  if (bgp_path.len = 0) then {
    bgp_large_community.add((OWNAS, LC_ORIGIN_NODEID, NODEID));
    bgp_large_community.add((OWNAS, LC_ORIGIN_REGION, DN42_REGION));
  }
}

define IBGP_NETS_4 = [
  # 允许通过 iBGP 承载的 IPv4 内部/服务前缀。
  # 当前包含本 AS 聚合前缀和已知内部节点 loopback，渲染自 inventory。
    172.20.0.0/26+, 172.20.0.62/32+
];

define IBGP_NETS_6 = [
  # 允许通过 iBGP 承载的 IPv6 内部/服务前缀。
    fdce:1111:2222:9500::1/128+, fdce:1111:2222::/48+
];

function is_ibgp_network() {
  # iBGP import/export 的前缀白名单。非 BGP 来源只有命中这里才允许进入 iBGP。
  if net.type = NET_IP4 && net ~ IBGP_NETS_4 then {
    return true;
  }
  if net.type = NET_IP6 && net ~ IBGP_NETS_6 then {
    return true;
  }
  return false;
}

function ibgp_import_filter() {
  # iBGP 入站过滤：接受 BGP 学到的路由；对本地产生的服务/内部路由只接受白名单前缀。
  if (source != RTS_BGP && !is_ibgp_network()) then {
    reject "ibgp_import_filter: rejecting unknown internal prefix", net;
  }
  if (bgp_path.len = 0) then {
    bgp_med = 10;
  }
  accept;
}

function ibgp_export_filter() {
  # iBGP 出站过滤：避免把不属于内部白名单的本地直连/静态路由扩散到全网。
  if (source != RTS_BGP && !is_ibgp_network()) then {
    reject;
  }
  accept;
}