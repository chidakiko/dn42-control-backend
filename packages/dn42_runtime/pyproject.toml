[project]
name = "dn42-runtime"
version = "1.0.0"
description = "Runtime planning helpers for DN42 control backend"
requires-python = ">=3.11"
dependencies = [
  "dn42-common",
  "dn42-schemas",
  "jinja2>=3.1",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["dn42_runtime"]
# config-docker（路由 Dockerfile.j2 等模板）就在 dn42_runtime 包目录内，
# packages 已整树纳入；不要再用 force-include 重复加入——新版 hatchling 会因
# 同一路径重复加入而硬报错（ValueError: A second file ... same path）。
