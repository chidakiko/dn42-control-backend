[project]
name = "dn42-common"
version = "1.0.0"
description = "Shared utilities for DN42 control backend"
requires-python = ">=3.11"
dependencies = [
	"jinja2>=3.1",
	"cryptography>=42.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["dn42_common"]
