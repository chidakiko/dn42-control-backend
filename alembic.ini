[alembic]
# Alembic config for dn42-control-backend.
# Run from repo root: `alembic upgrade head`.
# DSN is taken from env var DN42_CONTROL_DATABASE_URL by migrations/env.py;
# the value below is a harmless default for `alembic --help`.
script_location = migrations
sqlalchemy.url = sqlite+aiosqlite:///./control.db
file_template = %%(rev)s_%%(slug)s

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
