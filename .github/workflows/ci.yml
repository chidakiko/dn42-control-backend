name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - name: Install first-party packages + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install \
            -e packages/dn42_common \
            -e packages/dn42_schemas \
            -e packages/dn42_runtime \
            -e packages/dn42_templates \
            -e apps/control-server \
            -e apps/node-agent \
            -e ".[dev]"
      - name: Run tests
        run: python -m pytest
      - name: Byte-compile
        run: python -m compileall apps packages tests

  build-wheels:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Build first-party wheels
        run: |
          python -m pip install --upgrade pip build
          for pkg in packages/dn42_common packages/dn42_schemas packages/dn42_runtime packages/dn42_templates apps/control-server apps/node-agent; do
            python -m build --wheel --outdir dist "$pkg"
          done
          ls -l dist
      - uses: actions/upload-artifact@v7
        with:
          name: python-wheels
          path: dist/*.whl

  build-web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v7
        with:
          name: web-build
          path: apps/web/build
